<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container">

      <div class="page-header" id="welcome-section">
        <h1 class="page-title" id="welcome-text">Admin Dashboard</h1>
        <p class="page-subtitle">Overview of platform activity</p>
      </div>

      <div class="dashboard-grid mb-8" id="stats-grid">
        <div class="skeleton skeleton-card" style="height:100px"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
      </div>

      <h2 style="font-size:1.3rem;margin-bottom:var(--sp-4);">Quick Actions</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--sp-4);" class="mb-8">
        <a href="admin-providers.html?filter=pending" class="card card-body text-center" style="cursor:pointer;text-decoration:none;padding:var(--sp-6);">
          <div style="font-size:2rem;margin-bottom:var(--sp-2);">&#9989;</div>
          <div class="fw-600">Approve Providers</div>
        </a>
        <a href="admin-categories.html" class="card card-body text-center" style="cursor:pointer;text-decoration:none;padding:var(--sp-6);">
          <div style="font-size:2rem;margin-bottom:var(--sp-2);">&#128194;</div>
          <div class="fw-600">Manage Categories</div>
        </a>
        <a href="admin-users.html" class="card card-body text-center" style="cursor:pointer;text-decoration:none;padding:var(--sp-6);">
          <div style="font-size:2rem;margin-bottom:var(--sp-2);">&#128101;</div>
          <div class="fw-600">View Users</div>
        </a>
        <a href="admin-bookings.html" class="card card-body text-center" style="cursor:pointer;text-decoration:none;padding:var(--sp-6);">
          <div style="font-size:2rem;margin-bottom:var(--sp-2);">&#128197;</div>
          <div class="fw-600">View Bookings</div>
        </a>
        <a href="admin-reports.html" class="card card-body text-center" style="cursor:pointer;text-decoration:none;padding:var(--sp-6);">
          <div style="font-size:2rem;margin-bottom:var(--sp-2);">&#128202;</div>
          <div class="fw-600">View Reports</div>
        </a>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-6);" class="mb-8">
        <div>
          <div class="flex justify-between items-center mb-4">
            <h2 style="font-size:1.3rem;">Pending Providers</h2>
            <a href="admin-providers.html?filter=pending" class="btn btn-ghost btn-sm">View All</a>
          </div>
          <div id="pending-providers">
            <div class="skeleton skeleton-card" style="height:80px;margin-bottom:var(--sp-3)"></div>
            <div class="skeleton skeleton-card" style="height:80px"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between items-center mb-4">
            <h2 style="font-size:1.3rem;">Recent Bookings</h2>
            <a href="admin-bookings.html" class="btn btn-ghost btn-sm">View All</a>
          </div>
          <div id="recent-bookings">
            <div class="skeleton skeleton-card" style="height:80px;margin-bottom:var(--sp-3)"></div>
            <div class="skeleton skeleton-card" style="height:80px"></div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
