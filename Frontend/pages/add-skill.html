<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Skill — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container container-sm">

      <div class="page-header">
        <h1 class="page-title">Add Skill</h1>
        <p class="page-subtitle">Add a skill to your provider profile</p>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="add-skill-form" novalidate>

            <div class="form-group">
              <label for="skill-category">Category *</label>
              <select id="skill-category" class="form-select" required>
                <option value="">Select a category</option>
              </select>
            </div>

            <div class="form-group">
              <label for="skill-name">Skill *</label>
              <select id="skill-name" class="form-select" required disabled>
                <option value="">Select a skill</option>
              </select>
            </div>

            <div class="form-group">
              <label for="skill-experience">Years of Experience</label>
              <input type="number" id="skill-experience" class="form-input" min="0" max="50" placeholder="e.g. 3">
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full mt-4" id="skill-submit">
              <span id="skill-submit-text">Add Skill</span>
              <span id="skill-submit-spinner" class="spinner sm hidden"></span>
            </button>

          </form>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/add-skill.js"></script>
</body>
</html>
