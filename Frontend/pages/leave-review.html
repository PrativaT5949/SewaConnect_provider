<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Review — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container container-sm">

      <div class="page-header">
        <h1 class="page-title">Leave a Review</h1>
        <p class="page-subtitle">Share your experience with this service</p>
      </div>

      <div id="booking-info-loading">
        <div class="skeleton skeleton-card" style="height:120px;margin-bottom:var(--sp-6)"></div>
        <div class="skeleton skeleton-card" style="height:300px"></div>
      </div>

      <div id="review-content" class="hidden">
        <div class="card mb-6" id="booking-info-card">
          <div class="card-header"><h3>Booking Details</h3></div>
          <div class="card-body" id="booking-info-body"></div>
        </div>

        <div class="card">
          <div class="card-body">
            <form id="review-form" novalidate>

              <div class="form-group text-center">
                <label style="margin-bottom:var(--sp-3);display:block;">Your Rating *</label>
                <div class="star-selector" id="star-selector" style="display:flex;justify-content:center;gap:var(--sp-2);">
                  <button type="button" class="star-btn" data-rating="1" style="font-size:2.5rem;color:var(--border);cursor:pointer;background:none;border:none;">&#9733;</button>
                  <button type="button" class="star-btn" data-rating="2" style="font-size:2.5rem;color:var(--border);cursor:pointer;background:none;border:none;">&#9733;</button>
                  <button type="button" class="star-btn" data-rating="3" style="font-size:2.5rem;color:var(--border);cursor:pointer;background:none;border:none;">&#9733;</button>
                  <button type="button" class="star-btn" data-rating="4" style="font-size:2.5rem;color:var(--border);cursor:pointer;background:none;border:none;">&#9733;</button>
                  <button type="button" class="star-btn" data-rating="5" style="font-size:2.5rem;color:var(--border);cursor:pointer;background:none;border:none;">&#9733;</button>
                </div>
                <input type="hidden" id="review-rating" value="0">
              </div>

              <div class="form-group">
                <label for="review-comment">Your Review *</label>
                <textarea id="review-comment" class="form-textarea" rows="5" placeholder="Tell others about your experience..." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-full" id="review-submit">
                <span id="review-submit-text">Submit Review</span>
                <span id="review-submit-spinner" class="spinner sm hidden"></span>
              </button>

            </form>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/leave-review.js"></script>
</body>
</html>
