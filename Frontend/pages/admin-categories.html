<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Categories — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">Manage Categories</h1>
        <p class="page-subtitle">Add, edit, and manage service categories</p>
      </div>

      <div class="card mb-8">
        <div class="card-header"><h3 id="add-edit-heading">Add New Category</h3></div>
        <div class="card-body">
          <form id="category-form" novalidate>
            <input type="hidden" id="cat-edit-id" value="">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
              <div class="form-group">
                <label for="cat-name">Category Name *</label>
                <input type="text" id="cat-name" class="form-input" placeholder="e.g. Home Repair" required>
              </div>
              <div class="form-group">
                <label for="cat-icon">Icon (emoji or HTML entity)</label>
                <input type="text" id="cat-icon" class="form-input" placeholder="e.g. &#128295;">
              </div>
            </div>
            <div class="form-group">
              <label for="cat-description">Description</label>
              <textarea id="cat-description" class="form-textarea" rows="2" placeholder="Brief description of the category"></textarea>
            </div>
            <div class="flex gap-3">
              <button type="submit" class="btn btn-primary" id="cat-submit">
                <span id="cat-submit-text">Add Category</span>
              </button>
              <button type="button" class="btn btn-ghost hidden" id="cat-cancel-edit">Cancel Edit</button>
            </div>
          </form>
        </div>
      </div>

      <div id="categories-list">
        <div class="skeleton skeleton-card" style="height:60px;margin-bottom:var(--sp-3)"></div>
        <div class="skeleton skeleton-card" style="height:60px;margin-bottom:var(--sp-3)"></div>
        <div class="skeleton skeleton-card" style="height:60px"></div>
      </div>

      <div id="empty-state" class="hidden">
        <div class="empty-state">
          <div class="empty-icon">&#128194;</div>
          <h3 class="empty-title">No Categories Yet</h3>
          <p class="empty-desc">Add your first category above.</p>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin-categories.js"></script>
</body>
</html>
