<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          Sewa<span class="brand-highlight">Connect</span>
        </div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Log in to your account</p>
      </div>

      <div id="login-error" class="alert alert-danger hidden" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group floating">
          <input type="email" id="login-email" class="form-input" placeholder=" " required autocomplete="email">
          <label class="float-label" for="login-email">Email Address</label>
        </div>

        <div class="form-group floating">
          <input type="password" id="login-password" class="form-input" placeholder=" " required autocomplete="current-password">
          <label class="float-label" for="login-password">Password</label>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-2" id="login-submit">
          <span id="login-btn-text">Login</span>
          <span id="login-btn-spinner" class="spinner sm hidden"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p class="mt-2"><a href="register-provider.html">Register as Provider</a></p>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
