<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Detail — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-8);padding-bottom:var(--sp-16);">
    <div class="container">

      <div id="provider-loading">
        <div class="skeleton skeleton-card" style="height:200px;margin-bottom:var(--sp-6)"></div>
        <div class="skeleton skeleton-card" style="height:120px;margin-bottom:var(--sp-6)"></div>
        <div class="skeleton skeleton-card" style="height:300px"></div>
      </div>

      <div id="provider-content" class="hidden">
        <div class="provider-header" id="provider-header"></div>

        <div class="provider-stats" id="provider-stats"></div>

        <div class="content-grid">
          <div id="provider-main">
            <div class="card mb-6" id="about-section">
              <div class="card-header"><h3>About</h3></div>
              <div class="card-body" id="about-body"></div>
            </div>

            <div class="card mb-6" id="skills-section">
              <div class="card-header"><h3>Skills</h3></div>
              <div class="card-body" id="skills-body"></div>
            </div>

            <div class="card mb-6" id="services-section">
              <div class="card-header"><h3>Services</h3></div>
              <div class="card-body" id="services-body"></div>
            </div>

            <div class="card" id="reviews-section">
              <div class="card-header"><h3>Reviews</h3></div>
              <div class="card-body" id="reviews-body"></div>
            </div>
          </div>

          <div class="content-sidebar">
            <div class="card" id="booking-sidebar">
              <div class="card-body text-center" id="sidebar-content"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="provider-error" class="hidden">
        <div class="empty-state">
          <div class="empty-icon">&#128533;</div>
          <h3 class="empty-title">Provider Not Found</h3>
          <p class="empty-desc">The provider you're looking for doesn't exist or has been removed.</p>
          <a href="find-providers.html" class="btn btn-primary" style="margin-top:var(--sp-4)">Find Providers</a>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/provider-detail.js"></script>
</body>
</html>
