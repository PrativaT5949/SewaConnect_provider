<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container container-sm">

      <div class="page-header">
        <h1 class="page-title">Edit Profile</h1>
        <p class="page-subtitle">Update your personal information</p>
      </div>

      <div id="profile-loading">
        <div class="skeleton skeleton-card" style="height:400px"></div>
      </div>

      <div id="profile-form-wrapper" class="hidden">
        <div class="card">
          <div class="card-body">
            <form id="edit-profile-form" novalidate>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                <div class="form-group">
                  <label for="edit-first-name">First Name *</label>
                  <input type="text" id="edit-first-name" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="edit-last-name">Last Name *</label>
                  <input type="text" id="edit-last-name" class="form-input" required>
                </div>
              </div>

              <div class="form-group">
                <label for="edit-phone">Phone Number</label>
                <input type="tel" id="edit-phone" class="form-input" placeholder="+977-9XXXXXXXXX">
              </div>

              <div class="form-group">
                <label for="edit-address">Address</label>
                <input type="text" id="edit-address" class="form-input" placeholder="Your address">
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                <div class="form-group">
                  <label for="edit-city">City</label>
                  <input type="text" id="edit-city" class="form-input" placeholder="e.g. Kathmandu">
                </div>
                <div class="form-group">
                  <label for="edit-district">District</label>
                  <input type="text" id="edit-district" class="form-input" placeholder="e.g. Kathmandu">
                </div>
              </div>

              <input type="hidden" id="edit-latitude" value="">
              <input type="hidden" id="edit-longitude" value="">

              <button type="button" class="btn btn-ghost btn-sm mb-4" id="get-location-btn">&#128205; Use My Current Location</button>

              <div id="provider-fields" class="hidden">
                <div class="divider"></div>
                <h4 style="margin-bottom:var(--sp-4);">Provider Information</h4>

                <div class="form-group">
                  <label for="edit-bio">Bio</label>
                  <textarea id="edit-bio" class="form-textarea" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="form-group">
                  <label for="edit-tagline">Tagline</label>
                  <input type="text" id="edit-tagline" class="form-input" placeholder="e.g. Professional Home Repair Expert">
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                  <div class="form-group">
                    <label for="edit-experience">Years of Experience</label>
                    <input type="number" id="edit-experience" class="form-input" min="0" max="50">
                  </div>
                  <div class="form-group">
                    <label for="edit-hourly-rate">Hourly Rate (Rs.)</label>
                    <input type="number" id="edit-hourly-rate" class="form-input" min="0">
                  </div>
                </div>

                <div class="form-group">
                  <label>Working Hours</label>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                    <input type="time" id="edit-work-start" class="form-input" value="09:00">
                    <input type="time" id="edit-work-end" class="form-input" value="17:00">
                  </div>
                </div>

                <div class="form-group">
                  <label for="edit-citizenship">Citizenship Image</label>
                  <input type="file" id="edit-citizenship" class="form-input" accept="image/*">
                  <div id="citizenship-preview" class="mt-2"></div>
                </div>

                <div class="form-group">
                  <label for="edit-certificate">Certificate Image</label>
                  <input type="file" id="edit-certificate" class="form-input" accept="image/*">
                  <div id="certificate-preview" class="mt-2"></div>
                </div>
              </div>

              <div class="flex gap-3 mt-6">
                <button type="submit" class="btn btn-primary" id="save-btn">
                  <span id="save-text">Save Changes</span>
                  <span id="save-spinner" class="spinner sm hidden"></span>
                </button>
                <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
              </div>

            </form>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/edit-profile.js"></script>
</body>
</html>
