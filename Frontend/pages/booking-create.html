<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Booking — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container container-sm">

      <div class="page-header">
        <h1 class="page-title">Create Booking</h1>
        <p class="page-subtitle">Fill in the details to book a service</p>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="booking-form" novalidate>

            <div class="form-group">
              <label for="booking-category">Category *</label>
              <select id="booking-category" class="form-select" required>
                <option value="">Select a category</option>
              </select>
            </div>

            <div class="form-group">
              <label for="booking-service">Service *</label>
              <select id="booking-service" class="form-select" required disabled>
                <option value="">Select a service</option>
              </select>
            </div>

            <div class="form-group">
              <label for="booking-provider">Provider (Optional)</label>
              <select id="booking-provider" class="form-select">
                <option value="">Any available provider</option>
              </select>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
              <div class="form-group">
                <label for="booking-date">Booking Date *</label>
                <input type="date" id="booking-date" class="form-input" required>
              </div>
              <div class="form-group">
                <label for="booking-time">Booking Time *</label>
                <input type="time" id="booking-time" class="form-input" required>
              </div>
            </div>

            <div class="form-group">
              <label for="booking-address">Address *</label>
              <input type="text" id="booking-address" class="form-input" placeholder="Enter your address" required>
              <button type="button" class="btn btn-ghost btn-sm mt-2" id="get-location-btn">&#128205; Get My Location</button>
            </div>

            <input type="hidden" id="booking-latitude" value="">
            <input type="hidden" id="booking-longitude" value="">

            <div class="form-group">
              <label for="booking-notes">Notes</label>
              <textarea id="booking-notes" class="form-textarea" placeholder="Any special instructions or requirements..." rows="3"></textarea>
            </div>

            <div class="card" style="background:var(--bg);border-color:var(--border);margin-bottom:var(--sp-5);">
              <div class="card-body" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="fs-lg fw-600">Estimated Price:</span>
                <span id="booking-price" class="fs-lg fw-700" style="color:var(--primary);">Rs. 0</span>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full" id="booking-submit">
              <span id="submit-text">Book Now</span>
              <span id="submit-spinner" class="spinner sm hidden"></span>
            </button>

          </form>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/booking-create.js"></script>
</body>
</html>
