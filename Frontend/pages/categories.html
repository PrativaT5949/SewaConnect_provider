<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Categories — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container">
      <div class="page-header text-center">
        <h1 class="page-title">Browse Categories</h1>
        <p class="page-subtitle">Explore all the service categories available on SewaConnect</p>
      </div>

      <div class="categories-grid" id="categories-grid">
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
        <div class="skeleton skeleton-card" style="height:180px"></div>
      </div>

      <div id="categories-empty" class="hidden">
        <div class="empty-state">
          <div class="empty-icon">&#128196;</div>
          <h3 class="empty-title">No Categories Found</h3>
          <p class="empty-desc">Categories will appear here once they are added.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/categories.js"></script>
</body>
</html>
