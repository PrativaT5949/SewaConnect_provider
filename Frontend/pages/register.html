<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="auth-page">
    <div class="auth-card" style="max-width:500px;">
      <div class="auth-header">
        <div class="auth-logo">
          Sewa<span class="brand-highlight">Connect</span>
        </div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join as a customer</p>
      </div>

      <div id="register-error" class="alert alert-danger hidden" role="alert"></div>

      <form id="register-form" novalidate>
        <div class="d-grid gap-4" style="grid-template-columns:1fr 1fr;">
          <div class="form-group">
            <label for="reg-first-name">First Name</label>
            <input type="text" id="reg-first-name" class="form-input" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="reg-last-name">Last Name</label>
            <input type="text" id="reg-last-name" class="form-input" placeholder="Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="form-input" placeholder="john@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" class="form-input" placeholder="+977-9800000000" required>
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Min 8 characters" required autocomplete="new-password">
          <div class="progress mt-2" id="password-strength-bar" style="height:4px;">
            <div class="progress-bar" id="password-strength-fill" style="width:0%"></div>
          </div>
          <small id="password-strength-text" class="text-muted"></small>
        </div>

        <div class="form-group">
          <label for="reg-confirm-password">Confirm Password</label>
          <input type="password" id="reg-confirm-password" class="form-input" placeholder="Re-enter password" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" id="reg-terms" required>
            <span class="fs-sm">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-2" id="register-submit">
          <span id="reg-btn-text">Create Account</span>
          <span id="reg-btn-spinner" class="spinner sm hidden"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/register.js"></script>
</body>
</html>
