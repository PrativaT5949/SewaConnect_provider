<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">My Favorites</h1>
        <p class="page-subtitle">Providers you've saved for quick access</p>
      </div>

      <div id="favorites-list">
        <div class="d-grid gap-6" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>

      <div id="empty-state" class="hidden">
        <div class="empty-state">
          <div class="empty-icon">&#9829;</div>
          <h3 class="empty-title">No Favorites Yet</h3>
          <p class="empty-desc">Find providers to add to your favorites!</p>
          <a href="find-providers.html" class="btn btn-primary" style="margin-top:var(--sp-4)">Find Providers</a>
        </div>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/favorites.js"></script>
</body>
</html>
