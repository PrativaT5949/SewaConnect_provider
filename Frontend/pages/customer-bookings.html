<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — SewaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="app-topbar"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <main class="page-content" style="padding-top:var(--sp-10);padding-bottom:var(--sp-16);">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">My Bookings</h1>
        <p class="page-subtitle">Manage your service bookings</p>
      </div>

      <div class="tabs mb-6" id="filter-tabs">
        <button class="tab-link active" data-filter="">All</button>
        <button class="tab-link" data-filter="pending">Pending</button>
        <button class="tab-link" data-filter="accepted">Accepted</button>
        <button class="tab-link" data-filter="completed">Completed</button>
        <button class="tab-link" data-filter="cancelled">Cancelled</button>
      </div>

      <div id="bookings-list">
        <div class="skeleton skeleton-card" style="height:100px;margin-bottom:var(--sp-4)"></div>
        <div class="skeleton skeleton-card" style="height:100px;margin-bottom:var(--sp-4)"></div>
        <div class="skeleton skeleton-card" style="height:100px"></div>
      </div>

      <div id="empty-state" class="hidden">
        <div class="empty-state">
          <div class="empty-icon">&#128197;</div>
          <h3 class="empty-title">No Bookings Found</h3>
          <p class="empty-desc">You haven't made any bookings yet. Find a provider to get started!</p>
          <a href="find-providers.html" class="btn btn-primary" style="margin-top:var(--sp-4)">Find Providers</a>
        </div>
      </div>

      <div class="pagination mt-8" id="pagination"></div>

    </div>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/customer-bookings.js"></script>
</body>
</html>
